version: "3.9"

services:
  # ── MySQL Database ─────────────────────────────────────────────────────────
  db:
    image: mysql:8.0
    container_name: edusync_db
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-rootpassword}
      MYSQL_DATABASE: edusync
      MYSQL_USER: ${MYSQL_USER:-edusync_user}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-edusync_pass}
    ports:
      - "3306:3306"
    volumes:
      - db_data:/var/lib/mysql
      - ./database/schema.sql:/docker-entrypoint-initdb.d/01_schema.sql
      - ./database/seed.sql:/docker-entrypoint-initdb.d/02_seed.sql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── FastAPI Backend ────────────────────────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: edusync_backend
    restart: unless-stopped
    environment:
      DATABASE_URL: mysql+mysqlclient://${MYSQL_USER:-edusync_user}:${MYSQL_PASSWORD:-edusync_pass}@db:3306/edusync
      SECRET_KEY: ${SECRET_KEY:-your_super_secret_key_for_edusync}
      ALGORITHM: HS256
      ACCESS_TOKEN_EXPIRE_MINUTES: 60
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - ./backend:/app        # live-reload in development

  # ── React / Vite Frontend ─────────────────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: edusync_frontend
    restart: unless-stopped
    ports:
      - "80:80"
    depends_on:
      - backend

volumes:
  db_data:
